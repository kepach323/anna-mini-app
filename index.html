<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анна | Брови & Макияж</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div class="ios-container">
        <!-- Заголовок -->
        <header class="ios-header">
            <h1 class="ios-title">✨ Привет!</h1>
            <p class="ios-subtitle">Брови & Макияж в Ростове-на-Дону</p>
        </header>

        <!-- Игра: Конфетная чашка -->
        <section class="ios-card">
            <h3 class="ios-section-title">Конфетная чашка</h3>
            <div class="candy-bowl-ios">
                <div class="candy-count">Конфет: <span id="candy-count">0</span></div>
                <div class="bowl-ios">
                    <div id="candies-container"></div>
                </div>
                <p class="ios-caption">Каждый новый посетитель добавляет конфетку!</p>
            </div>
        </section>

        <!-- Кнопка: Оставить отзыв -->
        <button class="ios-button primary" onclick="openYandex()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            Оставить отзыв в Яндекс.Картах
        </button>

        <!-- Меню -->
        <nav class="ios-nav">
            <button class="ios-menu-btn" onclick="location.href='profile.html'">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="7"/><circle cx="12" cy="10" r="3"/></svg>
                Профиль
            </button>
            <button class="ios-menu-btn" onclick="location.href='gallery.html'">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><image href=""/></svg>
                Галерея
            </button>
            <button class="ios-menu-btn" onclick="location.href='wheel.html'">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                Колесо
            </button>
        </nav>

        <!-- Кнопка записи -->
        <button class="ios-button primary" onclick="location.href='https://yandex.ru/maps/org/brovist_vizazhist_anna/81893036294/?booking%5Bpage%5D=services&booking%5Bpermalink%5D=81893036294&booking%5BresourceId%5D=4290849&ll=39.697505%2C47.238563&z=15'">
            Записаться на брови/макияж
        </button>
    </div>

    <script>
        // Игра: Конфетная чашка
        let candyCount = parseInt(localStorage.getItem('candyCount')) || 0;
        document.getElementById('candy-count').textContent = candyCount;

        // Добавляем конфетку при входе
        candyCount++;
        localStorage.setItem('candyCount', candyCount);
        document.getElementById('candy-count').textContent = candyCount;

        // Создаём конфетку
        const candy = document.createElement('div');
        candy.classList.add('candy');
        candy.style.left = `${Math.random() * 70}%`;
        candy.style.top = `${Math.random() * 70}%`;
        document.getElementById('candies-container').appendChild(candy);

        // Открыть Яндекс.Карты
        function openYandex() {
            window.open('https://yandex.ru/maps/org/brovist_vizazhist_anna/81893036294/', '_blank');
        }
    </script>
</body>
</html>
