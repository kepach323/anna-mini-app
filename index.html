<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <meta name="telegram-web-app" content="true">
    <title>Анна | Брови & Макияж</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div class="container">
    <header>
        <h1>✨ Привет!</h1>
        <p class="subtitle">Брови & Макияж в Ростове-на-Дону</p>
    </header>

    <div class="card">
        <div class="title">Конфетная чашка</div>
        <div class="candy-bowl">
            <div class="candy-count">Конфет: <span id="count">0</span></div>
            <div class="bowl" id="bowl"></div>
            <p class="subtitle">Каждый новый посетитель добавляет конфетку!</p>
        </div>
    </div>

    <button class="btn" onclick="openYandex()">
        🌟 Оставить отзыв в Яндекс.Картах
    </button>

    <button class="btn" onclick="openBooking()">
        📅 Записаться на брови/макияж
    </button>

    <div class="menu">
        <div class="menu-btn" onclick="alert('Галерея скоро!')">
            <svg class="icon" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            Галерея
        </div>
        <div class="menu-btn" onclick="alert('Колесо скоро!')">
            <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            Колесо
        </div>
        <div class="menu-btn" onclick="alert('Профиль скоро!')">
            <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="10" r="7"/><circle cx="12" cy="10" r="3"/></svg>
            Профиль
        </div>
        <div class="menu-btn" onclick="alert('Прайс скоро!')">
            <svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            Прайс
        </div>
    </div>

    <footer>
        © 2025 Анна | Брови & Макияж
    </footer>
</div>

<script>
    // Telegram WebApp
    if (window.Telegram && window.Telegram.WebApp) {
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
    }

    // Конфетная чашка
    let count = parseInt(localStorage.getItem('candyCount')) || 0;
    document.getElementById('count').textContent = count;

    count++;
    localStorage.setItem('candyCount', count);
    document.getElementById('count').textContent = count;

    const bowl = document.getElementById('bowl');
    for (let i = 0; i < 3; i++) {
        const candy = document.createElement('div');
        candy.classList.add('candy');
        candy.style.left = `${Math.random() * 70 + 15}%`;
        candy.style.top = `${Math.random() * 50 + 20}%`;
        candy.style.animationDelay = `${i * 0.3}s`;
        bowl.appendChild(candy);
    }

    function openYandex() {
        window.open('https://yandex.ru/maps/org/brovist_vizazhist_anna/81893036294/', '_blank');
    }

    function openBooking() {
        window.open('https://yandex.ru/maps/org/brovist_vizazhist_anna/81893036294/?booking%5Bpage%5D=services&booking%5Bpermalink%5D=81893036294&booking%5BresourceId%5D=4290849&ll=39.697505%2C47.238563&z=15', '_blank');
    }
</script>

</body>
</html>
